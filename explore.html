<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - Shake4Cake</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/explore.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="page-title">🔍 Explore</h1>
            <div class="header-actions">
                <button id="filterBtn" class="btn-header">
                    <i class="fas fa-filter"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="search-container">
            <div class="search-input-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search contests, users, or tags..." autocomplete="off">
                <button id="clearSearch" class="clear-btn hidden">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions">
                <!-- Search suggestions will appear here -->
            </div>
        </div>

        <!-- Search Filters -->
        <div class="search-filters">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-globe"></i>
                All
            </button>
            <button class="filter-btn" data-filter="contests">
                <i class="fas fa-trophy"></i>
                Contests
            </button>
            <button class="filter-btn" data-filter="users">
                <i class="fas fa-users"></i>
                Users
            </button>
            <button class="filter-btn" data-filter="tags">
                <i class="fas fa-hashtag"></i>
                Tags
            </button>
        </div>
    </section>

    <!-- Trending Section -->
    <section class="trending-section" id="trendingSection">
        <div class="section-header">
            <h2>🔥 Trending Now</h2>
            <button class="see-all-btn">See All</button>
        </div>
        
        <div class="trending-carousel">
            <div class="trending-contests" id="trendingContests">
                <!-- Trending contests will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Categories Section -->
    <section class="categories-section">
        <div class="section-header">
            <h2>Browse Categories</h2>
        </div>
        
        <div class="categories-grid">
            <button class="category-card" data-category="dance">
                <div class="category-icon">💃</div>
                <h3>Dance</h3>
                <p id="danceCount">0 contests</p>
            </button>
            <button class="category-card" data-category="singing">
                <div class="category-icon">🎤</div>
                <h3>Singing</h3>
                <p id="singingCount">0 contests</p>
            </button>
            <button class="category-card" data-category="comedy">
                <div class="category-icon">😂</div>
                <h3>Comedy</h3>
                <p id="comedyCount">0 contests</p>
            </button>
            <button class="category-card" data-category="art">
                <div class="category-icon">🎨</div>
                <h3>Art</h3>
                <p id="artCount">0 contests</p>
            </button>
            <button class="category-card" data-category="pets">
                <div class="category-icon">🐾</div>
                <h3>Pets</h3>
                <p id="petsCount">0 contests</p>
            </button>
            <button class="category-card" data-category="food">
                <div class="category-icon">🍕</div>
                <h3>Food</h3>
                <p id="foodCount">0 contests</p>
            </button>
            <button class="category-card" data-category="sports">
                <div class="category-icon">⚽</div>
                <h3>Sports</h3>
                <p id="sportsCount">0 contests</p>
            </button>
            <button class="category-card" data-category="challenges">
                <div class="category-icon">🎯</div>
                <h3>Challenges</h3>
                <p id="challengesCount">0 contests</p>
            </button>
        </div>
    </section>

    <!-- Featured Users Section -->
    <section class="featured-users-section">
        <div class="section-header">
            <h2>Featured Creators</h2>
            <button class="see-all-btn">See All</button>
        </div>
        
        <div class="users-carousel">
            <div class="featured-users" id="featuredUsers">
                <!-- Featured users will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Search Results Section -->
    <section class="search-results-section hidden" id="searchResultsSection">
        <div class="section-header">
            <h2>Search Results</h2>
            <span id="resultsCount" class="results-count">0 results</span>
        </div>
        
        <div id="searchResults" class="search-results">
            <!-- Search results will be loaded here -->
        </div>
        
        <div class="load-more-results">
            <button id="loadMoreResults" class="btn-secondary">
                <i class="fas fa-chevron-down"></i>
                Load More Results
            </button>
        </div>
    </section>

    <!-- Templates -->
    <template id="contestCardTemplate">
        <div class="contest-card" data-contest-id="">
            <div class="contest-image">
                <img src="" alt="Contest" class="contest-thumbnail">
                <div class="contest-overlay">
                    <div class="contest-stats">
                        <span class="participants">
                            <i class="fas fa-users"></i>
                            <span class="count">0</span>
                        </span>
                        <span class="prize">
                            <i class="fas fa-gift"></i>
                            <span class="amount">Prize</span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="contest-info">
                <h4 class="contest-title"></h4>
                <p class="contest-creator">by <span class="creator-name"></span></p>
                <div class="contest-timer">
                    <i class="fas fa-clock"></i>
                    <span class="time-left"></span>
                </div>
            </div>
        </div>
    </template>

    <template id="userCardTemplate">
        <div class="user-card" data-user-id="">
            <img src="" alt="User" class="user-avatar">
            <div class="user-info">
                <h4 class="username"></h4>
                <p class="user-stats">
                    <span class="contests-created">0 contests</span> • 
                    <span class="wins">0 wins</span>
                </p>
                <div class="user-badges">
                    <!-- User badges will be added here -->
                </div>
            </div>
            <button class="follow-btn" data-following="false">
                <i class="fas fa-plus"></i>
                Follow
            </button>
        </div>
    </template>

    <template id="tagCardTemplate">
        <div class="tag-card" data-tag="">
            <div class="tag-info">
                <h4 class="tag-name">#</h4>
                <p class="tag-stats">
                    <span class="contest-count">0 contests</span>
                </p>
            </div>
            <button class="follow-tag-btn">
                <i class="fas fa-plus"></i>
                Follow
            </button>
        </div>
    </template>

    <template id="suggestionTemplate">
        <div class="suggestion-item" data-type="" data-id="">
            <div class="suggestion-icon">
                <i class="fas fa-search"></i>
            </div>
            <div class="suggestion-content">
                <span class="suggestion-text"></span>
                <small class="suggestion-type"></small>
            </div>
        </div>
    </template>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Feed</span>
        </a>
        <a href="explore.html" class="nav-item active">
            <i class="fas fa-search"></i>
            <span>Explore</span>
        </a>
        <a href="upload.html" class="nav-item upload-btn">
            <i class="fas fa-plus"></i>
        </a>
        <a href="leaderboard.html" class="nav-item">
            <i class="fas fa-trophy"></i>
            <span>Rankings</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Advanced Filter Modal -->
    <div id="filterModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Advanced Filters</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="filter-group">
                    <h4>Contest Status</h4>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="active" checked>
                        <span class="checkmark"></span>
                        Active Contests
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="status" value="ended">
                        <span class="checkmark"></span>
                        Ended Contests
                    </label>
                </div>

                <div class="filter-group">
                    <h4>Prize Range</h4>
                    <div class="range-input">
                        <input type="range" id="prizeRange" min="0" max="1000" value="1000">
                        <span id="prizeValue">Up to $1000</span>
                    </div>
                </div>

                <div class="filter-group">
                    <h4>Duration</h4>
                    <select id="durationFilter">
                        <option value="all">Any Duration</option>
                        <option value="1hour">Less than 1 hour</option>
                        <option value="1day">Less than 1 day</option>
                        <option value="1week">Less than 1 week</option>
                        <option value="1month">Less than 1 month</option>
                    </select>
                </div>

                <div class="filter-group">
                    <h4>Media Type</h4>
                    <label class="checkbox-label">
                        <input type="checkbox" name="mediaType" value="video" checked>
                        <span class="checkmark"></span>
                        Video
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="mediaType" value="image" checked>
                        <span class="checkmark"></span>
                        Image
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="mediaType" value="audio" checked>
                        <span class="checkmark"></span>
                        Audio
                    </label>
                </div>

                <div class="modal-actions">
                    <button class="btn-secondary" id="clearFilters">Clear All</button>
                    <button class="btn-primary" id="applyFilters">Apply Filters</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/explore.js"></script>
    <script type="module" src="js/utils.js"></script>
</body>
</html>
